apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-tester
  namespace: default
  labels:
    app: e2e-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-tester
  template:
    metadata:
      labels:
        app: e2e-tester
    spec:
      containers:
      - name: tester
        image: gcr.io/universe-mapmaker/e2e-tester:latest
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: HEADLESS
          value: "1"
        - name: NODE_ENV
          value: "production"
        - name: TESTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: e2e-tester-secrets
              key: api-key
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /api/status
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/status
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-tester
  namespace: default
spec:
  selector:
    app: e2e-tester
  ports:
  - port: 8081
    targetPort: 8081
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e2e-tester
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://universe-mapmaker.web.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, X-API-Key"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  tls:
  - hosts:
    - tests.universemapmaker.online
    secretName: e2e-tester-tls
  rules:
  - host: tests.universemapmaker.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: e2e-tester
            port:
              number: 8081
