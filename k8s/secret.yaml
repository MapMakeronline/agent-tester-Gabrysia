# Utwórz secret ręcznie (zalecane):
#
# kubectl create secret generic e2e-tester-secrets \
#   --from-literal=api-key="TWOJ_KLUCZ_API" \
#   --from-literal=mapmaker-user="Mestwin" \
#   --from-literal=mapmaker-pass="Kaktus,1" \
#   --from-file=sheets-sa=config/sheets-service-account.json
#
# Utwórz configmap z konfiguracją arkusza:
#
# kubectl create configmap e2e-tester-config \
#   --from-file=sheet-config.json=config/sheet-config.json
#
# Albo zastosuj ten plik (zmień wartości base64):
#   echo -n "twoj-tajny-klucz" | base64
apiVersion: v1
kind: Secret
metadata:
  name: e2e-tester-secrets
  namespace: default
type: Opaque
data:
