  mapmaker-user: TWVzdHdpbg==               # "Mestwin"
  mapmaker-pass: S2FrdHVzLDE=               # "Kaktus,1" - ZMIEŃ na produkcji!
  # sheets-sa: wstrzyknij przez --from-file (za duży na inline)
